name: Font Reproducibility Contract

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src-tauri/src/project_fonts.rs"
      - "src-tauri/src/project_archive.rs"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
      - "src/projectArchive.ts"
      - "tests/projectArchive.test.ts"
      - "docs/FONT_REPRODUCIBILITY_TESTS.md"

jobs:
  font-contract:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libwebkit2gtk-4.1-dev \
            build-essential libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Test PDF font identity and package validation
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib project_fonts
      - name: Test archive font contract and security limits
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib project_archive
