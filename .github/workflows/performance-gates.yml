name: Performance Gates

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "benchmarks/**"
      - "scripts/run-performance-benchmarks.ts"
      - "src/performance/**"
      - "src/preview/**"
      - "src/editor/spellcheck.ts"
      - "src-tauri/src/segmentation/**"
      - "package.json"
      - "bun.lock"
  push:
    branches: [main]
    paths:
      - "benchmarks/**"
      - "scripts/run-performance-benchmarks.ts"
      - "src/performance/**"
      - "src/preview/**"
      - "src/editor/spellcheck.ts"
      - "src-tauri/src/segmentation/**"

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: typst-community/setup-typst@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux release dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libwebkit2gtk-4.1-dev \
            build-essential libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run deterministic performance fixtures
        run: bun run benchmark:performance
      - name: Build production frontend
        run: bun run build
      - name: Build native release library
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --lib
      - name: Run performance contract tests
        run: bun test tests/performanceDiagnostics.test.ts tests/previewVirtualization.test.ts tests/spellcheck.test.ts
      - name: Retain benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: performance-${{ runner.os }}
          path: artifacts/performance/report.json
